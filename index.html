<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time-Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
  
  <div class="card shadow p-4" style="width: 400px;">
    
    <h3 class="text-center mb-4">Time Management</h3>
    <form id="form">

      <div class="mb-3">
        <label class="form-label">Task</label>
        <input type="text" id="name"  class="form-control"  placeholder="Enter a Task" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <input type="text" id="des" class="form-control"  placeholder="Enter a Description" required>
      </div>

      <div class="d-grid">
        <button type="button" onclick="addData()" class="btn btn-primary">
          Add 
        </button>
      </div>
    </form>
    <ul id="list" class="list-group mt-4"></ul>
  </div>
</div>
<script src="Script.js"></script>
</body>
</html>
